name: Deployment Stack - Plan/Apply (Terraform-style report)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      operation:
        description: "plan = report only, apply = report + update stack"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]
      actionOnUnmanage:
        description: "Lifecycle control"
        required: true
        default: "deleteResources"
        type: choice
        options: [deleteResources, detachAll, deleteAll]
      denySettingsMode:
        description: "Guardrails against portal drift"
        required: true
        default: "none"
        type: choice
        options: [none, denyDelete, denyWriteAndDelete]

permissions:
  id-token: write
  contents: read

jobs:
  stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure CLI + Bicep
        shell: pwsh
        run: |
          az version
          az bicep upgrade
          az bicep version

      - name: Resolve variables
        id: vars
        shell: pwsh
        run: |
          $envName = "${{ inputs.environment }}"

          $RG  = "bicep-stacks"
          $LOC = "southcentralus"
          $STACK = "stk-automation-storage-$envName"

          $BICEP  = "infra/stacks/storage/main.bicep"
          $PARAMS = "infra/params/$envName.parameter.json"

          "RG=$RG" | Out-File $env:GITHUB_OUTPUT -Append
          "LOC=$LOC" | Out-File $env:GITHUB_OUTPUT -Append
          "STACK_NAME=$STACK" | Out-File $env:GITHUB_OUTPUT -Append
          "BICEP_FILE=$BICEP" | Out-File $env:GITHUB_OUTPUT -Append
          "PARAMS_FILE=$PARAMS" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Plan (stack-aware drift report, single file)
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $RG         = "${{ steps.vars.outputs.RG }}"
          $LOC        = "${{ steps.vars.outputs.LOC }}"
          $STACK_NAME = "${{ steps.vars.outputs.STACK_NAME }}"
          $BICEP_FILE = "${{ steps.vars.outputs.BICEP_FILE }}"
          $PARAMS_FILE= "${{ steps.vars.outputs.PARAMS_FILE }}"
          $AOU        = "${{ inputs.actionOnUnmanage }}"
          $RUN_ID     = "${{ github.run_id }}"

          az group create -n $RG -l $LOC --only-show-errors | Out-Null

          # What-If
          $whatIf = az deployment group what-if `
            --resource-group $RG `
            --name "whatif-$RUN_ID" `
            --template-file $BICEP_FILE `
            --parameters "@$env:GITHUB_WORKSPACE/$PARAMS_FILE" `
            --only-show-errors 2>&1

          $whatIf | Out-File /tmp/whatif.txt -Encoding utf8

          # Compile template
          az bicep build --file $BICEP_FILE --outfile /tmp/template.json | Out-Null
          $template = Get-Content /tmp/template.json -Raw | ConvertFrom-Json

          # Load params
          $params = Get-Content $PARAMS_FILE -Raw | ConvertFrom-Json
          $paramValues = @{}
          foreach ($p in $params.parameters.PSObject.Properties) {
            $paramValues[$p.Name] = $p.Value.value
          }

          # Load stack safely (do not fail if missing)
          $stackObj = @{}
          $stackJson = & {
            $PSNativeCommandUseErrorActionPreference = $false
            az stack group show -g $RG -n $STACK_NAME -o json --only-show-errors 2>$null
          }

          if ($LASTEXITCODE -eq 0 -and $stackJson) {
            $stackObj = $stackJson | ConvertFrom-Json
          }
          $global:LASTEXITCODE = 0

          function Find-SubId($o) {
            if ($o -match "/subscriptions/([^/]+)/") { return $Matches[1] }
            foreach ($p in $o.PSObject.Properties) {
              $r = Find-SubId $p.Value
              if ($r) { return $r }
            }
          }

          function Collect-Ids($o, [ref]$set) {
            if ($o -is [string] -and $o -like "/subscriptions/*/providers/*") {
              $set.Value.Add($o) | Out-Null
            }
            foreach ($p in $o.PSObject.Properties) {
              Collect-Ids $p.Value ([ref]$set.Value)
            }
          }

          $lines = Get-Content /tmp/whatif.txt
          function Blocks($s) {
            $rx = "^\s{2}\$s\sMicrosoft\."
            $b=@()
            for ($i=0;$i -lt $lines.Count;$i++){
              if ($lines[$i] -match $rx){
                $blk=@($lines[$i])
                $j=$i+1
                while ($j -lt $lines.Count -and $lines[$j].StartsWith("    ")){
                  $blk+=$lines[$j];$j++
                }
                $b+=($blk -join "`n");$i=$j-1
              }
            }
            $b
          }

          $add = Blocks "+"
          $mod = Blocks "~"
          $del = Blocks "-"

          $adds=$add.Count
          $changes=$mod.Count
          $deletes=$del.Count

          $subId = Find-SubId $stackObj
          $desired = New-Object System.Collections.Generic.HashSet[string]
          if ($subId){
            foreach ($r in $template.resources){
              if ($r.name -is [string] -and $r.type){
                $desired.Add("/subscriptions/$subId/resourceGroups/$RG/providers/$($r.type)/$($r.name)") | Out-Null
              }
            }
          }

          $managed = New-Object System.Collections.Generic.HashSet[string]
          Collect-Ids $stackObj ([ref]$managed)

          $stackDeletes=@()
          if ($AOU -ne "detachAll"){
            $stackDeletes = $managed.Where({ -not $desired.Contains($_) })
          }

          $destroy = $deletes + $stackDeletes.Count

          $r = New-Object System.Collections.Generic.List[string]
          $r.Add("Terraform-style Drift Report (Deployment Stack)")
          $r.Add("==============================================")
          $r.Add("Stack: $STACK_NAME")
          $r.Add("Plan: $adds to add, $changes to change, $destroy to destroy")
          $r.Add("")

          if ($adds){$r.Add("+ Create");$r.AddRange($add);$r.Add("")}
          if ($changes){$r.Add("~ Modify");$r.AddRange($mod);$r.Add("")}
          if ($destroy){
            $r.Add("- Destroy");$r.AddRange($del)
            foreach ($i in $stackDeletes){$r.Add("- $i")}
          }
          if (-not $adds -and -not $changes -and -not $destroy){$r.Add("No changes detected.")}

          $r -join "`n" | Out-File drift-report.txt -Encoding utf8
          exit 0

      - name: Apply stack (only when operation=apply)
        if: ${{ inputs.operation == 'apply' }}
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"

          az stack group create `
            --name "${{ steps.vars.outputs.STACK_NAME }}" `
            --resource-group "${{ steps.vars.outputs.RG }}" `
            --template-file "${{ steps.vars.outputs.BICEP_FILE }}" `
            --parameters "@$env:GITHUB_WORKSPACE/${{ steps.vars.outputs.PARAMS_FILE }}" `
            --action-on-unmanage "${{ inputs.actionOnUnmanage }}" `
            --deny-settings-mode "${{ inputs.denySettingsMode }}" `
            --yes `
            --only-show-errors

      - name: Upload Drift Report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.txt
