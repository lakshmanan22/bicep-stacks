name: Deployment Stack - Plan/Apply (Terraform-style report)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      operation:
        description: "plan = report only, apply = report + update stack"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]
      actionOnUnmanage:
        description: "Lifecycle control"
        required: true
        default: "deleteResources"
        type: choice
        options: [deleteResources, detachAll, deleteAll]
      denySettingsMode:
        description: "Guardrails against portal drift"
        required: true
        default: "none"
        type: choice
        options: [none, denyDelete, denyWriteAndDelete]

permissions:
  id-token: write
  contents: read

jobs:
  stack:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure CLI + Bicep
        shell: pwsh
        run: |
          az version
          az bicep upgrade
          az bicep version

      - name: Plan (Terraform-style report in UI Summary)
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"

          # -------------------------
          # Variables
          # -------------------------
          $envName    = "${{ inputs.environment }}"
          $RG         = "bicep-stacks"
          $LOC        = "southcentralus"
          $STACK_NAME = "stk-automation-storage-$envName"
          $BICEP_REL  = "infra/stacks/storage/main.bicep"
          $PARAMS_REL = "infra/stacks/storage/params/$envName.parameter.json"
          $RUN_ID     = "${{ github.run_id }}"

          $BICEP_FILE  = Join-Path $env:GITHUB_WORKSPACE $BICEP_REL
          $PARAMS_FILE = Join-Path $env:GITHUB_WORKSPACE $PARAMS_REL
          $REPORT_FILE = Join-Path $env:GITHUB_WORKSPACE "drift-report.txt"

          az group create -n $RG -l $LOC --only-show-errors | Out-Null

          function Run-Az {
            param([scriptblock]$Cmd)
            $out = & { & $Cmd 2>&1 }
            $code = $LASTEXITCODE
            $global:LASTEXITCODE = 0
            return @{ Code = $code; Output = ($out | Out-String).TrimEnd() }
          }

          # -------------------------
          # Start report
          # -------------------------
          $report = New-Object System.Collections.Generic.List[string]
          $report.Add("Terraform-style Drift Report (Deployment Stack)")
          $report.Add("==============================================")
          $report.Add("Stack Name     : $STACK_NAME")
          $report.Add("Resource Group : $RG")
          $report.Add("Bicep File     : $BICEP_REL")
          $report.Add("Params File    : $PARAMS_REL")
          $report.Add("Run ID         : $RUN_ID")
          $report.Add("")

          # -------------------------
          # Bicep build
          # -------------------------
          $build = Run-Az { az bicep build --file $BICEP_FILE --outfile /tmp/template.json --only-show-errors }

          if ($build.Code -ne 0) {
            $report.Add("Plan: ERROR (bicep build failed)")
            $report.Add("")
            $report.Add($build.Output)
          }
          else {
            # -------------------------
            # What-If
            # -------------------------
            $whatif = Run-Az {
              az deployment group what-if `
                --resource-group $RG `
                --name "whatif-$RUN_ID" `
                --template-file $BICEP_FILE `
                --parameters "@$PARAMS_FILE" `
                --only-show-errors
            }

            if ($whatif.Code -ne 0) {
              $report.Add("Plan: ERROR (what-if failed)")
              $report.Add("")
              $report.Add($whatif.Output)
            }
            else {
              # -------------------------
              # Parse What-If output
              # -------------------------
              $lines = $whatif.Output -split "`r?`n"

              function Get-Blocks($symbol) {
                $rx = "^\s{2}\$symbol\sMicrosoft\."
                $blocks = @()
                for ($i = 0; $i -lt $lines.Count; $i++) {
                  if ($lines[$i] -match $rx) {
                    $blk = @($lines[$i])
                    $j = $i + 1
                    while ($j -lt $lines.Count -and $lines[$j].StartsWith("    ")) {
                      $blk += $lines[$j]
                      $j++
                    }
                    $blocks += ($blk -join "`n")
                    $i = $j - 1
                  }
                }
                return $blocks
              }

              $adds = Get-Blocks "+"
              $mods = Get-Blocks "~"
              $dels = Get-Blocks "-"

              $report.Add("Plan: $($adds.Count) to add, $($mods.Count) to change, $($dels.Count) to destroy")
              $report.Add("")

              if ($adds.Count -gt 0) {
                $report.Add("+ Create")
                $report.Add("--------")
                $adds | ForEach-Object { $report.Add($_) }
                $report.Add("")
              }

              if ($mods.Count -gt 0) {
                $report.Add("~ Modify")
                $report.Add("--------")
                $mods | ForEach-Object { $report.Add($_) }
                $report.Add("")
              }

              if ($dels.Count -gt 0) {
                $report.Add("- Destroy")
                $report.Add("---------")
                $dels | ForEach-Object { $report.Add($_) }
                $report.Add("")
              }

              if ($adds.Count -eq 0 -and $mods.Count -eq 0 -and $dels.Count -eq 0) {
                $report.Add("No changes detected.")
              }
            }
          }

          # -------------------------
          # Write report (single place)
          # -------------------------
          $final = $report -join "`n"
          $final | Out-File -FilePath $REPORT_FILE -Encoding utf8

          if ($env:GITHUB_STEP_SUMMARY) {
            Get-Content -Path $REPORT_FILE -Raw |
              Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

          Write-Host "========== DRIFT REPORT =========="
          Write-Host $final
          Write-Host "================================="

          exit 0

      - name: Apply stack (only when operation=apply)
        if: ${{ inputs.operation == 'apply' }}
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          az stack group create `
            --name "stk-automation-storage-${{ inputs.environment }}" `
            --resource-group "bicep-stacks" `
            --template-file "infra/stacks/storage/main.bicep" `
            --parameters "@infra/stacks/storage/params/${{ inputs.environment }}.parameter.json" `
            --action-on-unmanage "${{ inputs.actionOnUnmanage }}" `
            --deny-settings-mode "${{ inputs.denySettingsMode }}" `
            --yes `
            --only-show-errors
