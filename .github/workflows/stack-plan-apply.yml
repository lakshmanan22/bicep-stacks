name: Deployment Stack - Plan/Apply (Terraform-style report)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      operation:
        description: "plan = report only, apply = report + update stack"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]
      actionOnUnmanage:
        description: "Lifecycle control"
        required: true
        default: "deleteResources"
        type: choice
        options: [deleteResources, detachAll, deleteAll]
      denySettingsMode:
        description: "Guardrails against portal drift"
        required: true
        default: "none"
        type: choice
        options: [none, denyDelete, denyWriteAndDelete]

permissions:
  id-token: write
  contents: read

jobs:
  stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure CLI + Bicep
        shell: pwsh
        run: |
          az version
          az bicep upgrade
          az bicep version

      - name: Resolve variables
        id: vars
        shell: pwsh
        run: |
          $envName = "${{ inputs.environment }}"

          $RG  = "bicep-stacks"
          $LOC = "southcentralus"
          $STACK = "stk-automation-storage-$envName"

          $BICEP  = "infra/stacks/storage/main.bicep"
          $PARAMS = "infra/stacks/storage/params/$envName.parameter.json"

          "RG=$RG"              | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "LOC=$LOC"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "STACK_NAME=$STACK"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "BICEP_FILE=$BICEP"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "PARAMS_FILE=$PARAMS" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Plan (Terraform-style drift report)
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"

          $RG          = "${{ steps.vars.outputs.RG }}"
          $LOC         = "${{ steps.vars.outputs.LOC }}"
          $STACK_NAME  = "${{ steps.vars.outputs.STACK_NAME }}"
          $BICEP_REL   = "${{ steps.vars.outputs.BICEP_FILE }}"
          $PARAMS_REL  = "${{ steps.vars.outputs.PARAMS_FILE }}"
          $AOU         = "${{ inputs.actionOnUnmanage }}"
          $RUN_ID      = "${{ github.run_id }}"

          $BICEP_FILE  = Join-Path $env:GITHUB_WORKSPACE $BICEP_REL
          $PARAMS_FILE = Join-Path $env:GITHUB_WORKSPACE $PARAMS_REL

          az group create -n $RG -l $LOC --only-show-errors | Out-Null

          function Invoke-AzSafe {
            param([scriptblock]$Command)
            $out = & { & $Command 2>&1 }
            $code = $LASTEXITCODE
            $global:LASTEXITCODE = 0
            return @{ Code = $code; Output = ($out | Out-String).TrimEnd() }
          }

          # Build Bicep
          $build = Invoke-AzSafe { az bicep build --file $BICEP_FILE --outfile /tmp/template.json --only-show-errors }
          if ($build.Code -ne 0) {
            $report = @(
              "Terraform-style Drift Report (Deployment Stack)",
              "==============================================",
              "Stack Name     : $STACK_NAME",
              "Resource Group : $RG",
              "Bicep File     : $BICEP_REL",
              "Params File    : $PARAMS_REL",
              "Run ID         : $RUN_ID",
              "",
              "Plan: ERROR (bicep build failed)",
              "",
              $build.Output
            ) -join "`n"
            goto WRITE_SUMMARY
          }

          $template = Get-Content /tmp/template.json -Raw | ConvertFrom-Json

          # What-if
          $whatif = Invoke-AzSafe {
            az deployment group what-if `
              --resource-group $RG `
              --name "whatif-$RUN_ID" `
              --template-file $BICEP_FILE `
              --parameters "@$PARAMS_FILE" `
              --only-show-errors
          }

          if ($whatif.Code -ne 0) {
            $report = "What-if failed:`n$($whatif.Output)"
            goto WRITE_SUMMARY
          }

          $lines = $whatif.Output -split "`r?`n"
          function Blocks($s) {
            $rx = "^\s{2}\$s\sMicrosoft\."
            $r = @()
            for ($i=0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match $rx) {
                $b = @($lines[$i])
                $j = $i + 1
                while ($j -lt $lines.Count -and $lines[$j].StartsWith("    ")) { $b += $lines[$j]; $j++ }
                $r += ($b -join "`n")
                $i = $j - 1
              }
            }
            return $r
          }

          $adds = Blocks "+"
          $mods = Blocks "~"
          $dels = Blocks "-"

          # Stack-managed delete detection
          $managed = Invoke-AzSafe { az stack group show -g $RG -n $STACK_NAME --query "resources[].id" -o tsv --only-show-errors }
          $managedIds = @($managed.Output -split "`n" | Where-Object { $_ })

          $report = @(
            "Terraform-style Drift Report (Deployment Stack)",
            "==============================================",
            "Stack Name     : $STACK_NAME",
            "Resource Group : $RG",
            "Bicep File     : $BICEP_REL",
            "Params File    : $PARAMS_REL",
            "Run ID         : $RUN_ID",
            "",
            "Plan: $($adds.Count) to add, $($mods.Count) to change, $($dels.Count + $managedIds.Count) to destroy",
            ""
          )

          if ($adds) { $report += "+ Create"; $report += "--------"; $report += $adds; $report += "" }
          if ($mods) { $report += "~ Modify"; $report += "--------"; $report += $mods; $report += "" }
          if ($managedIds) {
            $report += "- Destroy"
            $report += "---------"
            $managedIds | ForEach-Object { $report += "- $_" }
          }

          if (-not ($adds -or $mods -or $managedIds)) {
            $report += "No changes detected."
          }

          $report = $report -join "`n"

          :WRITE_SUMMARY
          Write-Host "========== DRIFT REPORT =========="
          Write-Host $report
          Write-Host "================================="

          if ($env:GITHUB_STEP_SUMMARY) {
            @(
              "## Terraform-style Drift Report",
              "",
              "```text",
              $report,
              "```"
            ) -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

          Write-Host "::notice title=Drift Report::See the Summary tab for the Terraform-style drift report."
          exit 0

      - name: Apply stack (only when operation=apply)
        if: ${{ inputs.operation == 'apply' }}
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          az stack group create `
            --name "${{ steps.vars.outputs.STACK_NAME }}" `
            --resource-group "${{ steps.vars.outputs.RG }}" `
            --template-file "${{ steps.vars.outputs.BICEP_FILE }}" `
            --parameters "@${{ steps.vars.outputs.PARAMS_FILE }}" `
            --action-on-unmanage "${{ inputs.actionOnUnmanage }}" `
            --deny-settings-mode "${{ inputs.denySettingsMode }}" `
            --yes `
            --only-show-errors
