name: Deployment Stack - Plan/Apply (Terraform-style report)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      operation:
        description: "plan = report only, apply = report + update stack"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]
      actionOnUnmanage:
        description: "Lifecycle control"
        required: true
        default: "deleteResources"
        type: choice
        options: [deleteResources, detachAll, deleteAll]
      denySettingsMode:
        description: "Guardrails against portal drift"
        required: true
        default: "none"
        type: choice
        options: [none, denyDelete, denyWriteAndDelete]

permissions:
  id-token: write
  contents: read

jobs:
  stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure CLI + Bicep
        shell: pwsh
        run: |
          az version
          az bicep version 2>$null
          az bicep upgrade
          az bicep version

      - name: Resolve variables
        id: vars
        shell: pwsh
        run: |
          $envName = "${{ inputs.environment }}"

          $RG  = "bicep-stacks"
          $LOC = "southcentralus"
          $STACK = "stk-automation-storage-$envName"

          $BICEP  = "infra/stacks/storage/main.bicep"
          $PARAMS = "infra/stacks/storage/params/$envName.parameter.json"

          "RG=$RG"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "LOC=$LOC"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "STACK_NAME=$STACK" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "BICEP_FILE=$BICEP" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "PARAMS_FILE=$PARAMS" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Plan (stack-aware drift report, single file) - PowerShell
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"

          $RG         = "${{ steps.vars.outputs.RG }}"
          $LOC        = "${{ steps.vars.outputs.LOC }}"
          $STACK_NAME = "${{ steps.vars.outputs.STACK_NAME }}"
          $BICEP_REL  = "${{ steps.vars.outputs.BICEP_FILE }}"
          $PARAMS_REL = "${{ steps.vars.outputs.PARAMS_FILE }}"
          $AOU        = "${{ inputs.actionOnUnmanage }}"
          $RUN_ID     = "${{ github.run_id }}"

          $BICEP_FILE  = Join-Path $env:GITHUB_WORKSPACE $BICEP_REL
          $PARAMS_FILE = Join-Path $env:GITHUB_WORKSPACE $PARAMS_REL

          if (-not (Test-Path $BICEP_FILE)) { throw "Bicep file not found: $BICEP_FILE" }
          if (-not (Test-Path $PARAMS_FILE)) { throw "Params file not found: $PARAMS_FILE" }

          # Ensure RG exists
          az group create -n $RG -l $LOC --only-show-errors | Out-Null

          # Subscription ID (NO recursion)
          $subId = az account show --query id -o tsv

          # 1) What-If text output
          $whatIfPath = "/tmp/whatif.txt"
          $whatIfOut = & az deployment group what-if `
            --resource-group $RG `
            --name "whatif-$RUN_ID" `
            --template-file $BICEP_FILE `
            --parameters "@$PARAMS_FILE" `
            --only-show-errors 2>&1

          $whatIfOut | Out-File -FilePath $whatIfPath -Encoding utf8

          # 2) Compile Bicep to ARM JSON
          $templatePath = "/tmp/template.json"
          az bicep build --file $BICEP_FILE --outfile $templatePath | Out-Null
          $template = Get-Content $templatePath -Raw | ConvertFrom-Json

          # 3) Load params (for resolving [parameters('x')])
          $params = Get-Content $PARAMS_FILE -Raw | ConvertFrom-Json
          $paramValues = @{}
          foreach ($k in $params.parameters.PSObject.Properties.Name) {
            $paramValues[$k] = $params.parameters.$k.value
          }

          # 4) Stack-managed resource IDs (NO recursion)
          # Uses stack show query to return only ids
          $managedIdLines = & az stack group show -g $RG -n $STACK_NAME --query "resources[].id" -o tsv --only-show-errors 2>$null
          $managedIds = New-Object System.Collections.Generic.HashSet[string]
          if ($LASTEXITCODE -eq 0 -and $managedIdLines) {
            foreach ($id in ($managedIdLines -split "`n")) {
              $trim = $id.Trim()
              if ($trim) { [void]$managedIds.Add($trim) }
            }
          }

          # 5) Desired resource IDs from template (best-effort)
          $desiredIds = New-Object System.Collections.Generic.HashSet[string]
          foreach ($r in $template.resources) {
            $rtype = $r.type
            $rname = $r.name
            if (-not $rtype -or -not $rname) { continue }

            if ($rname -is [string] -and $rname -match "^\[parameters\('([^']+)'\)\]$") {
              $pname = $Matches[1]
              if ($paramValues.ContainsKey($pname)) { $rname = $paramValues[$pname] }
            }

            if ($rname -isnot [string]) { continue }
            if ($rname.Contains("[") -or $rname.Contains("]")) { continue }

            $rid = "/subscriptions/$subId/resourceGroups/$RG/providers/$rtype/$rname"
            [void]$desiredIds.Add($rid)
          }

          # 6) Parse What-If blocks (+/~/- only real resources)
          $lines = Get-Content $whatIfPath

          function Get-Blocks($lines, $symbol) {
            $rx = "^\s{2}\$symbol\sMicrosoft\."
            $blocks = @()
            for ($i=0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match $rx) {
                $blk = @($lines[$i])
                $j = $i + 1
                while ($j -lt $lines.Count -and $lines[$j].StartsWith("    ")) {
                  $blk += $lines[$j]
                  $j++
                }
                $blocks += ($blk -join "`n")
                $i = $j - 1
              }
            }
            return $blocks
          }

          $addBlocks = Get-Blocks $lines "+"
          $modBlocks = Get-Blocks $lines "~"
          $delBlocks = Get-Blocks $lines "-"

          $adds = $addBlocks.Count
          $changes = $modBlocks.Count
          $deletesFromWhatIf = $delBlocks.Count

          # 7) Stack-aware destroys: managed by stack but missing from template
          $stackDestroyIds = @()
          if (($AOU -eq "deleteResources" -or $AOU -eq "deleteAll") -and $managedIds.Count -gt 0 -and $desiredIds.Count -gt 0) {
            $stackDestroyIds = $managedIds.Where({ -not $desiredIds.Contains($_) }) | Sort-Object
          }

          $destroys = $deletesFromWhatIf + $stackDestroyIds.Count

          # 8) Build single report
          $report = New-Object System.Collections.Generic.List[string]
          $report.Add("Terraform-style Drift Report (Deployment Stack)")
          $report.Add("==============================================")
          $report.Add("Stack Name    : $STACK_NAME")
          $report.Add("Resource Group: $RG")
          $report.Add("Bicep File    : $BICEP_REL")
          $report.Add("Params File   : $PARAMS_REL")
          $report.Add("Run ID        : $RUN_ID")
          $report.Add("")
          $report.Add("Plan: $adds to add, $changes to change, $destroys to destroy")
          $report.Add("")

          if ($adds -gt 0) { $report.Add("+ Create"); $report.Add("--------"); $addBlocks | % { $report.Add($_) }; $report.Add("") }
          if ($changes -gt 0) { $report.Add("~ Modify"); $report.Add("--------"); $modBlocks | % { $report.Add($_) }; $report.Add("") }

          if ($destroys -gt 0) {
            $report.Add("- Destroy")
            $report.Add("---------")
            $delBlocks | % { $report.Add($_) }

            if ($stackDestroyIds.Count -gt 0) {
              $report.Add("")
              $report.Add("Stack-managed resources removed from template (will be deleted on apply)")
              $report.Add("-----------------------------------------------------------------------")
              $stackDestroyIds | % { $report.Add("- $_") }
              $report.Add("")
            }
          }

          if ($adds -eq 0 -and $changes -eq 0 -and $destroys -eq 0) { $report.Add("No changes detected.") }

          $reportPath = "drift-report.txt"
          $report -join "`n" | Out-File -FilePath $reportPath -Encoding utf8
          Get-Item $reportPath | Format-List | Out-Host

      - name: Apply stack (only when operation=apply)
        if: ${{ inputs.operation == 'apply' }}
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"

          $RG         = "${{ steps.vars.outputs.RG }}"
          $STACK_NAME = "${{ steps.vars.outputs.STACK_NAME }}"
          $BICEP_REL  = "${{ steps.vars.outputs.BICEP_FILE }}"
          $PARAMS_REL = "${{ steps.vars.outputs.PARAMS_FILE }}"
          $AOU        = "${{ inputs.actionOnUnmanage }}"
          $DSM        = "${{ inputs.denySettingsMode }}"

          $BICEP_FILE  = Join-Path $env:GITHUB_WORKSPACE $BICEP_REL
          $PARAMS_FILE = Join-Path $env:GITHUB_WORKSPACE $PARAMS_REL

          # Create/update deployment stack (Terraform-like lifecycle control). [1](https://stackoverflow.com/questions/70924899/how-can-i-adapt-an-existing-resource-with-azure-bicep)
          & az stack group create `
            --name $STACK_NAME `
            --resource-group $RG `
            --template-file $BICEP_FILE `
            --parameters "@$PARAMS_FILE" `
            --action-on-unmanage $AOU `
            --deny-settings-mode $DSM `
            --yes `
            --only-show-errors | Out-Null

      - name: Upload Drift Report (single file)
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.txt
          if-no-files-found: error
