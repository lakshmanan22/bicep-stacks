name: Deployment Stack - Plan/Apply (Terraform-style report)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      operation:
        description: "plan = report only, apply = report + update stack"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]
      actionOnUnmanage:
        description: "Lifecycle control"
        required: true
        default: "deleteResources"
        type: choice
        options: [deleteResources, detachAll, deleteAll]
      denySettingsMode:
        description: "Guardrails against portal drift"
        required: true
        default: "none"
        type: choice
        options: [none, denyDelete, denyWriteAndDelete]

permissions:
  id-token: write
  contents: read

jobs:
  stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure CLI + Bicep
        shell: pwsh
        run: |
          az version
          az bicep upgrade
          az bicep version

      - name: Resolve variables
        id: vars
        shell: pwsh
        run: |
          $envName = "${{ inputs.environment }}"

          $RG  = "bicep-stacks"
          $LOC = "southcentralus"
          $STACK = "stk-automation-storage-$envName"

          $BICEP  = "infra/stacks/storage/main.bicep"
          $PARAMS = "infra/params/$envName.parameter.json"

          "RG=$RG"              | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "LOC=$LOC"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "STACK_NAME=$STACK"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "BICEP_FILE=$BICEP"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "PARAMS_FILE=$PARAMS" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Plan (stack-aware drift report, single file)
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"

          $RG          = "${{ steps.vars.outputs.RG }}"
          $LOC         = "${{ steps.vars.outputs.LOC }}"
          $STACK_NAME  = "${{ steps.vars.outputs.STACK_NAME }}"
          $BICEP_FILE  = "${{ steps.vars.outputs.BICEP_FILE }}"
          $PARAMS_FILE = "${{ steps.vars.outputs.PARAMS_FILE }}"
          $AOU         = "${{ inputs.actionOnUnmanage }}"
          $RUN_ID      = "${{ github.run_id }}"
          $reportPath  = "drift-report.txt"

          # Ensure RG exists
          az group create -n $RG -l $LOC --only-show-errors | Out-Null

          function Invoke-AzSafe {
            param(
              [Parameter(Mandatory=$true)][string]$CommandLabel,
              [Parameter(Mandatory=$true)][scriptblock]$Command
            )

            $out = & {
              $PSNativeCommandUseErrorActionPreference = $false
              & $Command 2>&1
            }

            $code = $LASTEXITCODE
            $global:LASTEXITCODE = 0

            [pscustomobject]@{
              Label    = $CommandLabel
              ExitCode = $code
              Output   = ($out | Out-String).TrimEnd()
            }
          }

          # 0) Compile Bicep
          $build = Invoke-AzSafe -CommandLabel "bicep-build" -Command {
            az bicep build --file $BICEP_FILE --outfile /tmp/template.json --only-show-errors
          }

          if ($build.ExitCode -ne 0) {
            $lines = @(
              "Terraform-style Drift Report (Deployment Stack)",
              "==============================================",
              "Stack Name     : $STACK_NAME",
              "Resource Group : $RG",
              "Bicep File     : $BICEP_FILE",
              "Params File    : $PARAMS_FILE",
              "Run ID         : $RUN_ID",
              "",
              "Plan: ERROR (bicep build failed)",
              "",
              "ERROR: Bicep build failed (exit code $($build.ExitCode)).",
              "",
              $build.Output
            )
            ($lines -join "`n") | Out-File -FilePath $reportPath -Encoding utf8
            exit 0
          }

          $template = Get-Content /tmp/template.json -Raw | ConvertFrom-Json

          # 1) Validate
          $validate = Invoke-AzSafe -CommandLabel "deployment-validate" -Command {
            az deployment group validate --resource-group $RG --template-file $BICEP_FILE --parameters "@$env:GITHUB_WORKSPACE/$PARAMS_FILE" --only-show-errors
          }

          # 2) What-If
          $whatif = Invoke-AzSafe -CommandLabel "deployment-whatif" -Command {
            az deployment group what-if --resource-group $RG --name "whatif-$RUN_ID" --template-file $BICEP_FILE --parameters "@$env:GITHUB_WORKSPACE/$PARAMS_FILE" --only-show-errors
          }

          $whatIfText  = $whatif.Output
          $whatIfLines = $whatIfText -split "`r?`n"

          if ($whatif.ExitCode -ne 0) {
            $lines = @(
              "Terraform-style Drift Report (Deployment Stack)",
              "==============================================",
              "Stack Name     : $STACK_NAME",
              "Resource Group : $RG",
              "Bicep File     : $BICEP_FILE",
              "Params File    : $PARAMS_FILE",
              "Run ID         : $RUN_ID",
              "",
              "Plan: ERROR (what-if failed)",
              "",
              "Validate exit code: $($validate.ExitCode)",
              "What-if exit code  : $($whatif.ExitCode)",
              "",
              "--- Validate Output ---",
              $validate.Output,
              "",
              "--- What-If Output ---",
              $whatif.Output
            )
            ($lines -join "`n") | Out-File -FilePath $reportPath -Encoding utf8
            exit 0
          }

          function Get-Blocks($lines, $symbol) {
            $rx = "^\s{2}\$symbol\sMicrosoft\."
            $blocks = @()
            for ($i=0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match $rx) {
                $blk = @($lines[$i])
                $j = $i + 1
                while ($j -lt $lines.Count -and $lines[$j].StartsWith("    ")) {
                  $blk += $lines[$j]
                  $j++
                }
                $blocks += ($blk -join "`n")
                $i = $j - 1
              }
            }
            return $blocks
          }

          $addBlocks = Get-Blocks $whatIfLines "+"
          $modBlocks = Get-Blocks $whatIfLines "~"
          $delBlocks = Get-Blocks $whatIfLines "-"

          $adds    = $addBlocks.Count
          $changes = $modBlocks.Count
          $destroys= $delBlocks.Count

          $report = New-Object System.Collections.Generic.List[string]
          $report.Add("Terraform-style Drift Report (Deployment Stack)")
          $report.Add("==============================================")
          $report.Add("Stack Name     : $STACK_NAME")
          $report.Add("Resource Group : $RG")
          $report.Add("Bicep File     : $BICEP_FILE")
          $report.Add("Params File    : $PARAMS_FILE")
          $report.Add("Run ID         : $RUN_ID")
          $report.Add("")
          $report.Add("Plan: $adds to add, $changes to change, $destroys to destroy")
          $report.Add("")

          if ($adds -gt 0) {
            $report.Add("+ Create")
            $report.Add("--------")
            $addBlocks | ForEach-Object { $report.Add($_) }
            $report.Add("")
          }

          if ($changes -gt 0) {
            $report.Add("~ Modify")
            $report.Add("--------")
            $modBlocks | ForEach-Object { $report.Add($_) }
            $report.Add("")
          }

          if ($destroys -gt 0) {
            $report.Add("- Destroy")
            $report.Add("---------")
            $delBlocks | ForEach-Object { $report.Add($_) }
            $report.Add("")
          }

          if ($adds -eq 0 -and $changes -eq 0 -and $destroys -eq 0) {
            $report.Add("No changes detected.")
          }

          ($report -join "`n") | Out-File -FilePath $reportPath -Encoding utf8
          exit 0

      - name: Apply stack (only when operation=apply)
        if: ${{ inputs.operation == 'apply' }}
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"

          $RG         = "${{ steps.vars.outputs.RG }}"
          $STACK_NAME = "${{ steps.vars.outputs.STACK_NAME }}"
          $BICEP_FILE = "${{ steps.vars.outputs.BICEP_FILE }}"
          $PARAMS_FILE= "${{ steps.vars.outputs.PARAMS_FILE }}"
          $AOU        = "${{ inputs.actionOnUnmanage }}"
          $DSM        = "${{ inputs.denySettingsMode }}"

          az stack group create `
            --name $STACK_NAME `
            --resource-group $RG `
            --template-file $BICEP_FILE `
            --parameters "@$env:GITHUB_WORKSPACE/$PARAMS_FILE" `
            --action-on-unmanage $AOU `
            --deny-settings-mode $DSM `
            --yes `
            --only-show-errors

      - name: Upload Drift Report (single file)
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.txt
          if-no-files-found: error
