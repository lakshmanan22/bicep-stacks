name: Deployment Stack - Plan/Apply (Terraform-style report)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      operation:
        description: "plan = report only, apply = report + update stack"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]
      actionOnUnmanage:
        description: "Lifecycle control"
        required: true
        default: "deleteResources"
        type: choice
        options: [deleteResources, detachAll, deleteAll]
      denySettingsMode:
        description: "Guardrails against portal drift"
        required: true
        default: "none"
        type: choice
        options: [none, denyDelete, denyWriteAndDelete]

permissions:
  id-token: write
  contents: read

jobs:
  stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure CLI + Bicep
        shell: pwsh
        run: |
          az version
          az bicep upgrade
          az bicep version

      - name: Resolve variables
        id: vars
        shell: pwsh
        run: |
          $envName = "${{ inputs.environment }}"

          $RG  = "bicep-stacks"
          $LOC = "southcentralus"
          $STACK = "stk-automation-storage-$envName"

          $BICEP  = "infra/stacks/storage/main.bicep"
          $PARAMS = "infra/stacks/storage/params/$envName.parameter.json"

          "RG=$RG"              | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "LOC=$LOC"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "STACK_NAME=$STACK"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "BICEP_FILE=$BICEP"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "PARAMS_FILE=$PARAMS" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Plan (show report in UI Summary)
        shell: pwsh
        env:
          AZURE_CORE_ONLY_SHOW_ERRORS: "true"
        run: |
          $ErrorActionPreference = "Stop"

          $RG          = "${{ steps.vars.outputs.RG }}"
          $LOC         = "${{ steps.vars.outputs.LOC }}"
          $STACK_NAME  = "${{ steps.vars.outputs.STACK_NAME }}"
          $BICEP_REL   = "${{ steps.vars.outputs.BICEP_FILE }}"
          $PARAMS_REL  = "${{ steps.vars.outputs.PARAMS_FILE }}"
          $AOU         = "${{ inputs.actionOnUnmanage }}"
          $RUN_ID      = "${{ github.run_id }}"
          $reportPath  = "drift-report.txt"

          $BICEP_FILE  = Join-Path $env:GITHUB_WORKSPACE $BICEP_REL
          $PARAMS_FILE = Join-Path $env:GITHUB_WORKSPACE $PARAMS_REL

          # Ensure RG exists
          az group create -n $RG -l $LOC --only-show-errors | Out-Null

          function Invoke-AzSafe {
            param(
              [Parameter(Mandatory=$true)][string]$Label,
              [Parameter(Mandatory=$true)][scriptblock]$Command
            )

            # Run native command, capture stdout+stderr, preserve exit code
            $out = & { & $Command 2>&1 }
            $code = $LASTEXITCODE
            $global:LASTEXITCODE = 0

            [pscustomobject]@{
              Label    = $Label
              ExitCode = $code
              Output   = ($out | Out-String).TrimEnd()
            }
          }

          # 0) Compile Bicep -> template.json
          $build = Invoke-AzSafe -Label "bicep-build" -Command {
            az bicep build --file $BICEP_FILE --outfile /tmp/template.json --only-show-errors
          }

          if ($build.ExitCode -ne 0) {
            $report = @(
              "Terraform-style Drift Report (Deployment Stack)",
              "==============================================",
              "Stack Name     : $STACK_NAME",
              "Resource Group : $RG",
              "Bicep File     : $BICEP_REL",
              "Params File    : $PARAMS_REL",
              "Run ID         : $RUN_ID",
              "",
              "Plan: ERROR (bicep build failed)",
              "",
              "ERROR: Bicep build failed (exit code $($build.ExitCode)).",
              "",
              $build.Output
            ) -join "`n"

            $report | Out-File -FilePath $reportPath -Encoding utf8
            goto WRITE_SUMMARY
          }

          $template = Get-Content /tmp/template.json -Raw | ConvertFrom-Json

          # 1) What-If
          $whatif = Invoke-AzSafe -Label "deployment-whatif" -Command {
            az deployment group what-if `
              --resource-group $RG `
              --name "whatif-$RUN_ID" `
              --template-file $BICEP_FILE `
              --parameters "@$PARAMS_FILE" `
              --only-show-errors
          }

          if ($whatif.ExitCode -ne 0) {
            $report = @(
              "Terraform-style Drift Report (Deployment Stack)",
              "==============================================",
              "Stack Name     : $STACK_NAME",
              "Resource Group : $RG",
              "Bicep File     : $BICEP_REL",
              "Params File    : $PARAMS_REL",
              "Run ID         : $RUN_ID",
              "",
              "Plan: ERROR (what-if failed)",
              "",
              $whatif.Output
            ) -join "`n"

            $report | Out-File -FilePath $reportPath -Encoding utf8
            goto WRITE_SUMMARY
          }

          $whatIfLines = $whatif.Output -split "`r?`n"

          function Get-Blocks($lines, $symbol) {
            $rx = "^\s{2}\$symbol\sMicrosoft\."
            $blocks = @()
            for ($i=0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match $rx) {
                $blk = @($lines[$i])
                $j = $i + 1
                while ($j -lt $lines.Count -and $lines[$j].StartsWith("    ")) { $blk += $lines[$j]; $j++ }
                $blocks += ($blk -join "`n")
                $i = $j - 1
              }
            }
            return $blocks
          }

          $addBlocks = Get-Blocks $whatIfLines "+"
          $modBlocks = Get-Blocks $whatIfLines "~"
          $delBlocks = Get-Blocks $whatIfLines "-"

          # 2) Stack-managed IDs
          $managed = Invoke-AzSafe -Label "stack-managed-ids" -Command {
            az stack group show -g $RG -n $STACK_NAME --query "resources[].id" -o tsv --only-show-errors
          }

          $managedIds = New-Object System.Collections.Generic.HashSet[string]
          if ($managed.ExitCode -eq 0 -and $managed.Output) {
            foreach ($id in ($managed.Output -split "`r?`n")) {
              $t = $id.Trim()
              if ($t) { [void]$managedIds.Add($t) }
            }
          }

          # 3) Desired IDs from template (best-effort)
          $subId = az account show --query id -o tsv
          $desiredIds = New-Object System.Collections.Generic.HashSet[string]

          foreach ($r in $template.resources) {
            $rtype = $r.type
            $rname = $r.name
            if (-not $rtype -or -not $rname) { continue }

            if ($rname -isnot [string]) { continue }
            if ($rname.Contains("[") -or $rname.Contains("]")) { continue }

            [void]$desiredIds.Add("/subscriptions/$subId/resourceGroups/$RG/providers/$rtype/$rname")
          }

          # Stack-aware deletes (works even if template empty)
          $stackDestroyIds = @()
          if (($AOU -eq "deleteResources" -or $AOU -eq "deleteAll") -and $managedIds.Count -gt 0) {
            $stackDestroyIds = $managedIds.Where({ -not $desiredIds.Contains($_) }) | Sort-Object
          }

          $adds     = $addBlocks.Count
          $changes  = $modBlocks.Count
          $destroys = $delBlocks.Count + $stackDestroyIds.Count

          $reportLines = New-Object System.Collections.Generic.List[string]
          $reportLines.Add("Terraform-style Drift Report (Deployment Stack)")
          $reportLines.Add("==============================================")
          $reportLines.Add("Stack Name     : $STACK_NAME")
          $reportLines.Add("Resource Group : $RG")
          $reportLines.Add("Bicep File     : $BICEP_REL")
          $reportLines.Add("Params File    : $PARAMS_REL")
          $reportLines.Add("Run ID         : $RUN_ID")
          $reportLines.Add("")
          $reportLines.Add("Plan: $adds to add, $changes to change, $destroys to destroy")
          $reportLines.Add("")

          if ($adds -gt 0) {
            $reportLines.Add("+ Create")
            $reportLines.Add("--------")
            $addBlocks | ForEach-Object { $reportLines.Add($_) }
            $reportLines.Add("")
          }

          if ($changes -gt 0) {
            $reportLines.Add("~ Modify")
            $reportLines.Add("--------")
            $modBlocks | ForEach-Object { $reportLines.Add($_) }
            $reportLines.Add("")
          }

          if ($destroys -gt 0) {
            $reportLines.Add("- Destroy")
            $reportLines.Add("---------")
            $delBlocks | ForEach-Object { $reportLines.Add($_) }

            if ($stackDestroyIds.Count -gt 0) {
              $reportLines.Add("")
              $reportLines.Add("Stack-managed resources removed from template (will be deleted on apply)")
              $reportLines.Add("-----------------------------------------------------------------------")
              $stackDestroyIds | ForEach-Object { $reportLines.Add("- $_") }
              $reportLines.Add("")
            }
          }

          if ($adds -eq 0 -and $changes -eq 0 -and $destroys -eq 0) {
            $reportLines.Add("No changes detected.")
          }
